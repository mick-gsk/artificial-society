name: CI

# Integration gate for parallel multi-agent development.
#
# - pytest runs the FULL suite on every push/PR. It includes the determinism
#   contract (tests/test_headless.py digest + tests/test_regression_golden.py
#   60-tick golden trajectory), so it catches behavioural drift even when two
#   branches merge cleanly at the text level.
# - ruff lints/format-checks only the Python files a PR changes. Legacy code is
#   grandfathered (the repo is not yet fully ruff-clean); new and modified code
#   must be clean. This mirrors the per-file PostToolUse ruff hook and avoids a
#   risky repo-wide auto-rewrite that could alter the golden trajectory.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history so we can diff a PR against its base

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff>=0.6"

      - name: Lint & format-check changed Python files
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          mapfile -t CHANGED < <(git diff --name-only --diff-filter=ACMR \
            "origin/${{ github.base_ref }}...HEAD" -- '*.py')
          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "No changed Python files — skipping ruff."
            exit 0
          fi
          echo "Changed Python files:"
          printf '  %s\n' "${CHANGED[@]}"
          ruff check "${CHANGED[@]}"
          ruff format --check "${CHANGED[@]}"

      - name: Tests (determinism + golden trajectory)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest -q
